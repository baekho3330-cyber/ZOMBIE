<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>좀비 아포칼립스 생존자 유형 검사</title>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a06;
    --bg2: #111108;
    --surface: #161610;
    --surface2: #1e1e14;
    --border: rgba(180,160,60,0.18);
    --border-bright: rgba(180,160,60,0.55);
    --accent: #b8a03a;
    --accent2: #7db84a;
    --accent3: #c0392b;
    --text: #e8e2cc;
    --text2: #9a9070;
    --text3: #555040;
    --blood: #8b1a1a;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Particle fog */
  #fog {
    position: fixed; top:0; left:0; width:100%; height:100%;
    pointer-events: none; z-index: 0; overflow: hidden;
  }
  .spore {
    position: absolute;
    border-radius: 50%;
    animation: drift var(--dur) ease-in-out infinite;
    animation-delay: var(--delay);
    opacity: 0;
  }
  @keyframes drift {
    0% { opacity:0; transform: translateY(0) translateX(0); }
    30% { opacity: var(--bright); }
    70% { opacity: var(--bright); }
    100% { opacity:0; transform: translateY(-60px) translateX(var(--dx)); }
  }

  /* Glow blobs */
  .glow-blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(100px);
    pointer-events: none;
    z-index: 0;
  }
  .gb1 { width:500px; height:350px; background:rgba(100,130,40,0.05); top:0; left:-150px; }
  .gb2 { width:400px; height:400px; background:rgba(139,26,26,0.06); bottom:0; right:-100px; }
  .gb3 { width:350px; height:250px; background:rgba(184,160,58,0.04); top:50%; left:40%; }

  /* Noise texture overlay */
  body::before {
    content:'';
    position:fixed; inset:0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events:none; z-index:0; opacity:0.6;
  }

  /* Scan lines */
  body::after {
    content:'';
    position:fixed; inset:0;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px);
    pointer-events:none; z-index:9999;
  }

  #app {
    position: relative; z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
    min-height: 100vh;
  }

  .screen { display:none; animation: glitch-in .4s ease; }
  .screen.active { display:block; }
  #result.active { animation: none; }

  @keyframes glitch-in {
    0% { opacity:0; transform: translateY(12px) skewX(-1deg); filter: brightness(1.4); }
    40% { filter: brightness(1); }
    100% { opacity:1; transform: translateY(0) skewX(0); }
  }

  /* ── INTRO ── */
  .intro-wrapper {
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
  }

  .warning-tape {
    font-family: 'Special Elite', cursive;
    font-size: 11px;
    letter-spacing: 5px;
    color: #0a0a06;
    background: var(--accent);
    padding: 6px 24px;
    margin-bottom: 2.5rem;
    clip-path: polygon(0 0, 100% 0, 97% 50%, 100% 100%, 0 100%, 3% 50%);
    animation: flicker 4s ease-in-out infinite;
  }
  @keyframes flicker {
    0%,100% { opacity:1; }
    92% { opacity:1; }
    93% { opacity:.4; }
    94% { opacity:1; }
    96% { opacity:.6; }
    97% { opacity:1; }
  }

  .zombie-icon-wrap {
    position: relative;
    margin-bottom: 1.5rem;
  }
  .zombie-icon {
    font-size: 90px;
    display: block;
    animation: sway 3s ease-in-out infinite;
    filter: drop-shadow(0 0 20px rgba(139,26,26,0.6)) sepia(0.3);
  }
  .zombie-drip {
    display: flex; justify-content: center; gap: 8px;
    margin-top: -10px;
  }
  .drip {
    width: 4px;
    background: var(--blood);
    border-radius: 0 0 99px 99px;
    animation: drip-fall var(--dd) ease-in infinite;
    animation-delay: var(--de);
    opacity: 0;
  }
  @keyframes drip-fall {
    0% { height:0; opacity:0.8; }
    70% { height: var(--dh); opacity:0.8; }
    100% { height: var(--dh); opacity:0; }
  }
  @keyframes sway {
    0%,100% { transform: rotate(-3deg); }
    50% { transform: rotate(3deg); }
  }

  .intro-title {
    font-family: 'Special Elite', cursive;
    font-size: clamp(24px, 5.5vw, 38px);
    font-weight: 400;
    letter-spacing: 2px;
    margin-bottom: .75rem;
    color: var(--accent);
    text-shadow: 0 0 30px rgba(184,160,58,0.3), 2px 2px 0 rgba(139,26,26,0.4);
  }

  .intro-sub {
    font-size: 15px;
    color: var(--text2);
    line-height: 1.8;
    margin-bottom: 2rem;
    font-weight: 300;
    max-width: 460px;
  }

  .intro-stats {
    display: flex; gap: 2.5rem;
    margin-bottom: 2.5rem; justify-content: center;
  }
  .stat-item { text-align: center; }
  .stat-num {
    font-family: 'Special Elite', cursive;
    font-size: 26px;
    color: var(--accent);
    display: block;
    text-shadow: 0 0 10px rgba(184,160,58,0.3);
  }
  .stat-label { font-size: 11px; color: var(--text3); margin-top: 2px; letter-spacing: 2px; text-transform: uppercase; }

  .start-btn {
    font-family: 'Special Elite', cursive;
    font-size: 15px;
    letter-spacing: 4px;
    padding: 16px 52px;
    background: transparent;
    color: var(--accent);
    border: 1.5px solid var(--accent);
    cursor: pointer;
    text-transform: uppercase;
    transition: all .3s;
    position: relative;
    overflow: hidden;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }
  .start-btn::before {
    content:''; position:absolute; inset:0;
    background: var(--accent);
    transform: scaleX(0); transform-origin: left;
    transition: transform .35s ease; z-index:-1;
  }
  .start-btn:hover { color:#0a0a06; box-shadow: 0 0 25px rgba(184,160,58,0.35); }
  .start-btn:hover::before { transform: scaleX(1); }

  /* ── TEST SCREEN ── */
  .test-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.75rem;
    padding-bottom: 1.25rem;
    border-bottom: 1px solid var(--border);
  }

  .day-counter {
    font-family: 'Special Elite', cursive;
    font-size: 13px;
    color: var(--text3);
    letter-spacing: 3px;
  }
  .day-counter span { color: var(--accent); font-size: 18px; }

  .progress-ring-wrap {
    position: relative; width: 46px; height: 46px;
  }
  .progress-ring { transform: rotate(-90deg); }
  .ring-bg { fill:none; stroke: var(--surface2); stroke-width:3; }
  .ring-fill {
    fill:none; stroke: var(--accent); stroke-width:3;
    stroke-linecap: butt;
    stroke-dasharray: 113; stroke-dashoffset: 113;
    transition: stroke-dashoffset .4s ease;
  }
  .ring-pct {
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    font-family: 'Special Elite', cursive;
    font-size: 9px; color: var(--accent);
  }

  .category-tag {
    font-family: 'Special Elite', cursive;
    font-size: 10px; letter-spacing: 3px;
    color: var(--accent2); text-transform: uppercase;
    margin-bottom: .75rem;
    display: flex; align-items: center; gap: 6px;
  }
  .category-tag::before {
    content:'';
    display:inline-block; width:16px; height:1px;
    background: var(--accent2);
  }

  .q-text {
    font-size: 17px; font-weight: 500;
    color: var(--text); line-height: 1.65;
    margin-bottom: 1.75rem;
  }

  .choices { display:flex; flex-direction:column; gap:10px; margin-bottom:2rem; }

  .choice-btn {
    width:100%; text-align:left;
    padding: 16px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    cursor: pointer;
    color: var(--text2);
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 300; line-height: 1.5;
    transition: all .2s;
    display: flex; align-items: flex-start; gap: 14px;
    clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
  }
  .choice-btn:hover { background: var(--surface2); border-color: var(--border-bright); color: var(--text); }
  .choice-btn.selected { background: rgba(184,160,58,0.1); border-color: var(--accent); color: var(--text); }

  .choice-letter {
    flex-shrink:0; width:26px; height:26px;
    background: var(--surface2); border: 1px solid var(--border);
    display:flex; align-items:center; justify-content:center;
    font-size:11px; font-family:'Special Elite',cursive;
    color: var(--text3); transition: all .2s;
    margin-top:1px;
  }
  .choice-btn.selected .choice-letter {
    background: var(--accent); border-color: var(--accent);
    color: #0a0a06; box-shadow: 0 0 10px rgba(184,160,58,0.4);
  }

  .nav-row { display:flex; gap:10px; }
  .nav-btn {
    flex:1; padding:13px;
    background: transparent;
    border: 1px solid var(--border);
    cursor: pointer;
    font-size:12px; font-family:'Special Elite',cursive;
    color: var(--text3); letter-spacing:2px;
    transition: all .2s;
  }
  .nav-btn:hover:not(:disabled) { border-color: var(--border-bright); color: var(--text); }
  .nav-btn:disabled { opacity:.2; cursor:default; }
  .nav-btn.primary { background: rgba(184,160,58,0.12); border-color: var(--accent); color: var(--accent); }
  .nav-btn.primary:hover { background: var(--accent); color: #0a0a06; box-shadow: 0 0 18px rgba(184,160,58,0.3); }

  /* ── RESULT ── */
  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 2rem;
    margin-bottom: 1rem;
    position: relative; overflow:hidden;
    clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
  }
  .result-card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:3px;
    background: linear-gradient(90deg, var(--blood), var(--accent), var(--accent2));
  }
  .result-card::after {
    content: 'CLASSIFIED';
    position:absolute; top:16px; right:-28px;
    font-family:'Special Elite',cursive;
    font-size:10px; letter-spacing:3px;
    color: var(--blood); opacity:.25;
    transform: rotate(45deg); pointer-events:none;
  }

  .result-emoji-wrap { text-align:center; margin-bottom:1.5rem; }
  .result-emoji {
    font-size:80px; display:block;
    filter: drop-shadow(0 0 18px rgba(139,26,26,0.5)) sepia(0.2);
    animation: sway 3s ease-in-out infinite;
  }
  .result-drip-row { display:flex; justify-content:center; gap:10px; margin-top:-6px; }

  .result-name {
    font-family:'Special Elite',cursive;
    font-size: clamp(20px, 4.5vw, 28px);
    text-align:center;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(184,160,58,0.25), 2px 2px 0 rgba(139,26,26,0.3);
    margin-bottom:.4rem;
  }
  .result-sub {
    font-size:11px; text-align:center;
    color: var(--accent2); letter-spacing:3px;
    margin-bottom:1.5rem;
    font-family:'Special Elite',cursive;
  }

  .divider {
    height:1px; background: var(--border); margin:1.5rem 0;
    position:relative;
  }
  .divider::before {
    content:'✦'; position:absolute; left:50%; top:50%;
    transform: translate(-50%,-50%);
    background: var(--surface); padding:0 8px;
    color: var(--text3); font-size:10px;
  }

  .result-desc { font-size:14px; color:var(--text2); line-height:1.85; font-weight:300; }

  .traits-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:1.5rem; }
  .trait-chip {
    background: var(--surface2); border:1px solid var(--border);
    padding:9px 12px; font-size:12px; color:var(--text2);
    text-align:center; font-weight:300;
    clip-path: polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%);
  }
  .trait-chip::before { content:'▸ '; color:var(--accent); }

  .dim-section { margin-top:1.5rem; }
  .dim-title {
    font-family:'Special Elite',cursive;
    font-size:10px; letter-spacing:3px;
    color:var(--text3); margin-bottom:1rem; text-transform:uppercase;
  }
  .dim-row {
    display:grid; grid-template-columns:88px 1fr 88px;
    align-items:center; gap:10px; margin-bottom:11px;
  }
  .dim-l { font-size:11px; color:var(--text3); text-align:right; }
  .dim-r { font-size:11px; color:var(--text3); }
  .dim-bar-bg { height:5px; background:var(--surface2); overflow:hidden; }
  .dim-bar-fill {
    height:100%;
    background: linear-gradient(90deg, var(--blood), var(--accent), var(--accent2));
    transition: width .9s cubic-bezier(.4,0,.2,1);
  }

  .compat-section { margin-top:1.5rem; }
  .compat-title {
    font-family:'Special Elite',cursive;
    font-size:10px; letter-spacing:3px;
    color:var(--text3); margin-bottom:.75rem; text-transform:uppercase;
  }
  .compat-row { display:flex; gap:8px; flex-wrap:wrap; }
  .compat-tag {
    font-size:11px; padding:5px 14px;
    border:1px solid rgba(184,160,58,0.3);
    background:rgba(184,160,58,0.07);
    color:var(--accent);
    font-family:'Special Elite',cursive;
    letter-spacing:1px;
    clip-path: polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%);
  }

  .retry-btn {
    width:100%; padding:13px;
    background:transparent; border:1px solid var(--border);
    cursor:pointer; font-size:12px;
    font-family:'Special Elite',cursive; color:var(--text3);
    letter-spacing:3px; transition:all .2s; margin-top:10px;
    text-transform:uppercase;
  }
  .retry-btn:hover { border-color:var(--border-bright); color:var(--text); }
</style>
</head>
<body>

<div id="fog"></div>
<div class="glow-blob gb1"></div>
<div class="glow-blob gb2"></div>
<div class="glow-blob gb3"></div>

<div id="app">

  <!-- INTRO -->
  <div id="intro" class="screen active">
    <div class="intro-wrapper">
      <div class="warning-tape">⚠ OUTBREAK PROTOCOL ACTIVE ⚠</div>
      <div class="zombie-icon-wrap">
        <span class="zombie-icon">🧟</span>
        <div class="zombie-drip">
          <div class="drip" style="--dd:2.1s;--de:0s;--dh:18px;"></div>
          <div class="drip" style="--dd:2.8s;--de:0.6s;--dh:24px;"></div>
          <div class="drip" style="--dd:1.9s;--de:1.2s;--dh:14px;"></div>
          <div class="drip" style="--dd:3.2s;--de:0.3s;--dh:20px;"></div>
        </div>
      </div>
      <h1 class="intro-title">생존자 유형 분류 검사</h1>
      <p class="intro-sub">
        좀비 아포칼립스 발생 D+247일.<br>
        당신은 어떤 생존자입니까?<br>
        16가지 유형 중 당신의 본능을 분류합니다.
      </p>
      <div class="intro-stats">
        <div class="stat-item">
          <span class="stat-num">20</span>
          <div class="stat-label">질문</div>
        </div>
        <div class="stat-item">
          <span class="stat-num">16</span>
          <div class="stat-label">유형</div>
        </div>
        <div class="stat-item">
          <span class="stat-num">3분</span>
          <div class="stat-label">소요</div>
        </div>
      </div>
      <button class="start-btn" onclick="startTest()">검사 시작</button>
    </div>
  </div>

  <!-- TEST -->
  <div id="test" class="screen">
    <div class="test-header">
      <div class="day-counter">QUESTION <span id="qnum-disp">01</span> / 20</div>
      <div class="progress-ring-wrap">
        <svg class="progress-ring" width="46" height="46">
          <circle class="ring-bg" cx="23" cy="23" r="18"/>
          <circle class="ring-fill" id="ring" cx="23" cy="23" r="18"/>
        </svg>
        <div class="ring-pct" id="ring-pct">5%</div>
      </div>
    </div>

    <p class="q-text" id="qtext"></p>
    <div class="choices" id="choices"></div>
    <div class="nav-row">
      <button class="nav-btn" id="prevBtn" onclick="go(-1)">← 이전</button>
      <button class="nav-btn primary" id="nextBtn" onclick="go(1)">다음 →</button>
    </div>
  </div>

  <!-- RESULT -->
  <div id="result" class="screen">
    <div class="result-card">
      <div class="result-emoji-wrap">
        <span class="result-emoji" id="r-emoji"></span>
        <div class="result-drip-row">
          <div class="drip" style="--dd:2.5s;--de:0s;--dh:16px;"></div>
          <div class="drip" style="--dd:3s;--de:0.8s;--dh:22px;"></div>
          <div class="drip" style="--dd:2s;--de:0.4s;--dh:12px;"></div>
        </div>
      </div>
      <p class="result-name" id="r-name"></p>
      <p class="result-sub" id="r-sub"></p>
      <div class="divider"></div>
      <p class="result-desc" id="r-desc"></p>
      <div class="traits-grid" id="r-traits"></div>
      <div class="dim-section">
        <div class="dim-title">생존 본능 분석</div>
        <div id="r-bars"></div>
      </div>
      <div class="compat-section">
        <div class="compat-title">동행 추천 유형</div>
        <div class="compat-row" id="r-compat"></div>
      </div>
    </div>
    <button class="start-btn" style="width:100%;letter-spacing:4px" onclick="restart()">재검사</button>
    <button class="retry-btn" onclick="restart()">← 처음으로</button>
  </div>

</div>

<script>
// Spore particles
(function(){
  const f=document.getElementById('fog');
  const colors=['rgba(100,130,40,','rgba(184,160,58,','rgba(80,100,30,'];
  for(let i=0;i<60;i++){
    const el=document.createElement('div');
    el.className='spore';
    const size=Math.random()*4+1;
    const c=colors[Math.floor(Math.random()*colors.length)];
    el.style.cssText=`
      width:${size}px;height:${size}px;
      left:${Math.random()*100}%;top:${Math.random()*100}%;
      background:${c}0.6);
      --dur:${(Math.random()*6+4).toFixed(1)}s;
      --delay:${(Math.random()*8).toFixed(1)}s;
      --bright:${(Math.random()*0.5+0.1).toFixed(2)};
      --dx:${(Math.random()*40-20).toFixed(0)}px;
    `;
    f.appendChild(el);
  }
})();

const dimNames={
  EI:'행동 방식', SN:'정보 수집', TF:'판단 기준', JP:'생존 스타일'
};

const questions=[
  // EI
  {d:'EI', text:'다른 생존자 캠프를 발견했을 때 당신은?',
   a:{text:'직접 다가가 먼저 소통을 시도한다 — 협력이 생존율을 높인다',v:'E'},
   b:{text:'거리를 두고 먼저 관찰한다 — 그들을 믿을 수 있는지 확인해야 한다',v:'I'}},
  {d:'EI', text:'야간 당직 임무에서 선호하는 방식은?',
   a:{text:'다른 당직자와 이야기를 나누며 시간을 보낸다',v:'E'},
   b:{text:'혼자 조용히 주변을 경계하며 집중한다',v:'I'}},
  {d:'EI', text:'장기 거점을 정할 때 이상적인 동행 규모는?',
   a:{text:'많을수록 좋다 — 다양한 역할 분담이 가능하다',v:'E'},
   b:{text:'소수 정예가 낫다 — 신뢰와 효율이 중요하다',v:'I'}},
  {d:'EI', text:'오랜 탐색 임무 후 에너지를 회복하는 방법은?',
   a:{text:'동료들과 식사하며 오늘의 경험을 나눈다',v:'E'},

// Fisher-Yates shuffle
function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

let shuffledQ=[];
let cur=0, ans=[];

function startTest(){
  shuffledQ=shuffle(questions);
  cur=0;
  ans=new Array(shuffledQ.length).fill(null);
  document.getElementById('intro').classList.remove('active');
  document.getElementById('test').classList.add('active');
  render();
}

function render(){
  const q=shuffledQ[cur];
  document.getElementById('qnum-disp').textContent=String(cur+1).padStart(2,'0');

  document.getElementById('qtext').textContent=q.text;

  const pct=Math.round((cur+1)/shuffledQ.length*100);
  const r=18, circ=2*Math.PI*r;
  document.getElementById('ring').style.strokeDasharray=circ;
  document.getElementById('ring').style.strokeDashoffset=circ-(circ*pct/100);
  document.getElementById('ring-pct').textContent=pct+'%';

  const c=document.getElementById('choices');
  c.innerHTML='';
  ['a','b'].forEach(k=>{
    const btn=document.createElement('button');
    btn.className='choice-btn'+(ans[cur]===q[k].v?' selected':'');
    btn.innerHTML=`<span class="choice-letter">${k.toUpperCase()}</span>${q[k].text}`;
    btn.onclick=()=>{ans[cur]=q[k].v; render();};
    c.appendChild(btn);
  });

  document.getElementById('prevBtn').disabled=cur===0;
  const nb=document.getElementById('nextBtn');
  if(cur===shuffledQ.length-1){
    nb.textContent='결과 보기 →';
    nb.onclick=()=>{if(ans[cur]!==null)showResult();};
  } else {
    nb.textContent='다음 →';
    nb.onclick=()=>go(1);
  }
}

function go(d){
  if(d===1&&ans[cur]===null)return;
  cur=Math.max(0,Math.min(shuffledQ.length-1,cur+d));
  render();
}

function calcType(){
  const cnt={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};
  ans.forEach(v=>{if(v)cnt[v]++;});
  return (cnt.E>=cnt.I?'E':'I')+(cnt.S>=cnt.N?'S':'N')+(cnt.T>=cnt.F?'T':'F')+(cnt.J>=cnt.P?'J':'P');
}

function showResult(){
  const type=calcType();
  const s=survivors[type];
  document.getElementById('test').classList.remove('active');
  document.getElementById('result').classList.add('active');
  document.getElementById('r-emoji').textContent=s.emoji;
  document.getElementById('r-name').textContent=s.name;
  document.getElementById('r-sub').textContent=s.sub;
  document.getElementById('r-desc').textContent=s.desc;
  document.getElementById('r-traits').innerHTML=s.traits.map(t=>`<div class="trait-chip">${t}</div>`).join('');

  const cnt={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};
  ans.forEach(v=>{if(v)cnt[v]++;});
  const dims=[
    {l:'적극적 행동',r:'신중한 관찰',lc:cnt.E,rc:cnt.I},
    {l:'현실 집중',r:'직관 탐색',lc:cnt.S,rc:cnt.N},
    {l:'냉철한 판단',r:'공감 우선',lc:cnt.T,rc:cnt.F},
    {l:'철저한 계획',r:'유연한 즉흥',lc:cnt.J,rc:cnt.P},
  ];
  document.getElementById('r-bars').innerHTML=dims.map(d=>{
    const tot=d.lc+d.rc;
    const pct=tot?Math.round(d.lc/tot*100):50;
    return`<div class="dim-row">
      <span class="dim-l">${d.l}</span>
      <div class="dim-bar-bg"><div class="dim-bar-fill" style="width:0%" data-pct="${pct}"></div></div>
      <span class="dim-r">${d.r}</span>
    </div>`;
  }).join('');

  // wait for glitch-in animation (.4s) to finish, then trigger width transition
  setTimeout(()=>{
    document.querySelectorAll('.dim-bar-fill').forEach(el=>{
      el.style.width=el.dataset.pct+'%';
    });
  }, 450);

  document.getElementById('r-compat').innerHTML=s.compat.map(n=>`<span class="compat-tag">${n}</span>`).join('');
}

function restart(){
  shuffledQ=[];
  cur=0; ans=[];
  document.getElementById('result').classList.remove('active');
  document.getElementById('intro').classList.add('active');
}
